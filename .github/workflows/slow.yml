# 慢源补扫：牛客、实习僧、SPA 高校、飞书招聘等浏览器/社区源。
name: job-radar-slow

on:
  schedule:
    - cron: "47 9 * * 3,0"
      timezone: "Asia/Shanghai"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  slow:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python3 -m pip install --quiet -r requirements.txt
          python3 -m playwright install --with-deps chromium

      - name: Run slow sync
        run: python3 scripts/sync_plan.py slow

      - name: Build notify preview
        env:
          WORKBENCH_URL: https://jasmine-liu-min.github.io/job-radar/
        run: python3 scripts/notify_preview.py

      - name: Send new-only notify
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          WORKBENCH_URL: https://jasmine-liu-min.github.io/job-radar/
        run: python3 scripts/send_notify.py

      - name: Commit data
        run: |
          git config user.name  "job-radar-bot"
          git config user.email "job-radar-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "无新增/变更岗位，跳过 commit"
          else
            git commit -m "chore(data): slow sync jobs $(date -u +%F)"
            git push
          fi
