# 定时同步招聘信息（规划 8.1：GitHub Actions + 静态数据，零服务器零运维）。
# 每次跑 sync 做【增量累积】（新增追加、消失标 gone、保留用户状态），
# 再导出 jobs.html，把 data/ commit 回仓库；前端/浏览纯静态读取。
name: job-radar-sync
run-name: job-radar-sync / ${{ inputs.plan || github.event.schedule || 'manual' }}

on:
  schedule:
    # 周一到周六北京时间 09:17 快扫，不跑浏览器慢源。
    - cron: "17 9 * * 1-6"
      timezone: "Asia/Shanghai"
    # 周一到周六北京时间 12:17 兜底快扫；new-only 推送不会重复刷屏。
    - cron: "17 12 * * 1-6"
      timezone: "Asia/Shanghai"
    # 周日北京时间 09:47 深扫，补牛客/实习僧/SPA 高校等慢源。
    - cron: "47 9 * * 0"
      timezone: "Asia/Shanghai"
  workflow_dispatch:
    inputs:
      plan:
        description: "同步计划：fast=快扫；slow=慢源；full=全量；rescore=只重算展示；smart=本地策略入口"
        required: false
        default: "fast"
        type: choice
        options:
          - smart
          - fast
          - slow
          - full
          - rescore

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        if: github.event.schedule == '47 9 * * 0' || (github.event_name == 'workflow_dispatch' && (inputs.plan == 'slow' || inputs.plan == 'full'))
        run: python3 -m pip install --quiet -r requirements.txt

      - name: Install browser dependencies
        if: github.event.schedule == '47 9 * * 0' || (github.event_name == 'workflow_dispatch' && (inputs.plan == 'slow' || inputs.plan == 'full'))
        run: python3 -m playwright install --with-deps chromium

      - name: Run scheduled full sync
        if: github.event.schedule == '47 9 * * 0'
        run: python3 scripts/sync_plan.py full

      - name: Run fast/manual sync
        if: github.event.schedule != '47 9 * * 0'
        env:
          PLAN: ${{ inputs.plan || 'fast' }}
        run: python3 scripts/sync_plan.py "$PLAN"

      - name: Build notify preview
        env:
          WORKBENCH_URL: https://jasmine-liu-min.github.io/job-radar/
        run: python3 scripts/notify_preview.py

      - name: Send new-only notify
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          WORKBENCH_URL: https://jasmine-liu-min.github.io/job-radar/
        run: python3 scripts/send_notify.py

      - name: Commit data
        run: |
          git config user.name  "job-radar-bot"
          git config user.email "job-radar-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "无新增/变更岗位，跳过 commit"
          else
            git commit -m "chore(data): sync jobs $(date -u +%F)"
            git push
          fi
